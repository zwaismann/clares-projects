          - text: which offer more detail on 3-day rapid detox protocols, detox under sedation, and opioid-free recovery science. [4] [2]
        - paragraph [ref=e402]: If you or someone you care about is considering any form of opioid detoxification, including rapid detox, obtain independent medical opinions, verify hospital accreditation and physician credentials, and ask detailed questions about safety protocols, monitoring, and post-detox support before making any decision.[13] [9]
