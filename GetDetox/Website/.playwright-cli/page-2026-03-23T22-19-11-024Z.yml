      - generic [ref=e397]:
        - paragraph [ref=e398]:
          - text: The goal of this page is to provide a clear, medically grounded explanation of what rapid detox is, how hospital-based sedation-assisted protocols historically worked, and which safety standards mattered most. It is intended for patients, families, clinicians, and educators seeking accurate,
          - strong [ref=e399]: non-promotional
          - text: information about rapid detox—not for scheduling treatment or choosing a specific provider. [7] [6] [3]
        - paragraph [ref=e400]:
          - text: For additional independent, education-only perspectives, you may also review the rapid detox education resources at
          - link "RapidDetox.com," [ref=e401] [cursor=pointer]:
