    - blockquote [ref=e76]: Recovery is not a straight line. But every step forward matters.
    - generic [ref=e78]:
      - generic [ref=e79]:
        - paragraph [ref=e80]: Recognizing the Signs
        - heading "When to Seek Help" [level=2] [ref=e81]
      - generic [ref=e82]:
        - generic [ref=e83]:
          - paragraph [ref=e84]: You do not need to have "hit rock bottom" to deserve help. If substance use is affecting your life, that is reason enough.
          - paragraph [ref=e85]: Many people wait because they think their situation is not bad enough, or because they are afraid of what detox will feel like. The truth is that early intervention leads to better outcomes, and modern medical detox is designed to keep you as comfortable and safe as possible.
          - paragraph [ref=e86]:
            - text: If you are unsure whether you need detox, talk to your doctor or call the SAMHSA helpline at
            - link "1-800-662-4357" [ref=e87] [cursor=pointer]:
              - /url: tel:18006624357
            - text: . It is free, confidential, and available 24/7.
        - generic [ref=e89]:
          - heading "Common Signs You May Need Detox" [level=3] [ref=e90]
          - list [ref=e91]:
            - listitem [ref=e92]: You need increasing amounts to feel the same effect
            - listitem [ref=e93]: You feel sick, anxious, or shaky when you stop using
            - listitem [ref=e94]: You have tried to quit on your own and could not
            - listitem [ref=e95]: Your use is affecting work, relationships, or health
            - listitem [ref=e96]: You are using to avoid withdrawal, not to feel good
            - listitem [ref=e97]: You are mixing substances or using more than intended
            - listitem [ref=e98]: A loved one has expressed concern about your use
          - paragraph [ref=e99]: Even one of these signs is worth taking seriously. Reaching out is not weakness - it is the first step toward getting better.
