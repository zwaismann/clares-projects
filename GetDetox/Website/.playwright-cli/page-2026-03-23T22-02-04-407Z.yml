        - paragraph [ref=e31]: The Basics
        - heading "What Is Detox?" [level=2] [ref=e32]
      - generic [ref=e33]:
        - paragraph [ref=e34]: Detoxification is the process of clearing a substance from your body while managing the symptoms of withdrawal. It is the necessary first step before longer-term recovery can begin.
        - paragraph [ref=e35]: When your body becomes dependent on a substance like opioids or alcohol, it adapts to functioning with that drug present. When you stop using, your body has to readjust. That readjustment is withdrawal, and it can range from deeply uncomfortable to medically dangerous depending on the substance, how long you have been using, and your overall health.
        - paragraph [ref=e36]: Detox is not the same as treatment or recovery. It is the physical stabilization that makes treatment possible. Think of it as clearing the ground before you can build. After detox, ongoing support through counseling, medication-assisted treatment, or peer support groups is what sustains recovery.
        - paragraph [ref=e37]:
          - text: If you are wondering how long the process takes, read our
          - link "detox timeline guide" [ref=e38] [cursor=pointer]:
            - /url: /detox-timeline/
          - text: . If you are unsure what to expect physically, start with our
          - link "withdrawal symptoms overview" [ref=e39] [cursor=pointer]:
            - /url: /withdrawal-symptoms/
          - text: .
